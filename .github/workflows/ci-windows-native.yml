name: CI -- Windows native (MSYS2 MINGW64)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-windows-native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + test (Windows / MSYS2 MINGW64 / Ninja)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 (MINGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: win-native-fetchcontent-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            win-native-fetchcontent-

      - name: Configure (CMake / Ninja / Release)
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build -j

      - name: Run tests (ctest)
        run: |
          ctest --test-dir build --output-on-failure
