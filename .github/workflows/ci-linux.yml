name: CI -- Linux native

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + test (Ubuntu / GCC / Ninja)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install raylib runtime + build deps (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libasound2-dev \
            ninja-build

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: linux-fetchcontent-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            linux-fetchcontent-

      - name: Configure (CMake / Ninja / Release)
        run: |
          cmake -S . -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build
        run: |
          cmake --build build -j

      - name: Run tests (ctest)
        run: |
          ctest --test-dir build --output-on-failure

      - name: Verify Linux ELF binary exists
        run: |
          set -euo pipefail
          BIN=build/bin/ClaudeLander
          test -f "$BIN" || { echo "ERROR: $BIN not found"; exit 1; }
          file "$BIN"
          file "$BIN" | grep -q 'ELF 64-bit LSB.*x86-64'

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeLander-linux-x64
          path: build/bin/ClaudeLander
          if-no-files-found: error
